<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StandHub - Магазин Кейсов</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <style>
        /* --- ИГРОВОЙ ИНТЕРФЕЙС --- */
        body {
            background-color: #0b0c10;
            color: #ffffff;
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 15px;
            text-align: center;
            -webkit-user-select: none;
        }

        h1 {
            color: #ff9a00;
            font-size: 22px;
            text-shadow: 0 0 15px rgba(255, 154, 0, 0.4);
            margin-bottom: 5px;
        }

        .subtitle {
            color: #7f8c8d;
            font-size: 14px;
            margin-bottom: 20px;
        }

        /* --- ВЫБОР КЕЙСА --- */
        .cases-grid {
            display: flex;
            justify-content: center;
            gap: 15px;
            max-width: 400px;
            margin: 0 auto;
        }

        .case-card {
            background: linear-gradient(135deg, #1f2430, #161920);
            border: 2px solid #2c3242;
            border-radius: 14px;
            padding: 20px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            transition: 0.2s;
            width: 100%;
            max-width: 240px;
        }

        .case-card:active {
            transform: scale(0.95);
        }

        .case-card img {
            width: 100%;
            height: auto;
            margin-bottom: 10px;
        }

        .case-title {
            font-size: 18px;
            font-weight: bold;
        }

        .case-cost {
            color: #4caf50;
            font-weight: bold;
            margin-top: 5px;
            font-size: 16px;
        }

        /* --- ЭКРАН РУЛЕТКИ --- */
        #roulette-screen {
            display: none;
            max-width: 500px;
            margin: 0 auto;
        }

        .roulette-wrapper {
            position: relative;
            width: 100%;
            height: 130px;
            background-color: #11141a;
            border: 2px solid #ff9a00;
            border-radius: 12px;
            margin: 30px 0;
            overflow: hidden;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
        }

        .pointer {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 4px;
            height: 100%;
            background-color: #e74c3c;
            z-index: 10;
            box-shadow: 0 0 10px #e74c3c;
        }

        .tape {
            display: flex;
            position: absolute;
            left: 0;
            top: 15px;
            height: 100px;
            transition: transform 5s cubic-bezier(0.1, 0.8, 0.1, 1);
            will-change: transform;
        }

        .item-card {
            width: 100px;
            height: 100px;
            background: #1c1f26;
            margin: 0 5px;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 9px;
            padding: 5px;
            box-sizing: border-box;
            border-bottom: 4px solid #fff;
        }

        .item-card img {
            width: 65px;
            height: auto;
            margin-bottom: 5px;
        }

        /* Стили редкостей СО2 */
        .arcana { border-bottom-color: #e74c3c; background: radial-gradient(circle, #3a1c1c, #1c1f26); }
        .legendary { border-bottom-color: #9b59b6; background: radial-gradient(circle, #2b1a3a, #1c1f26); }
        .rare { border-bottom-color: #3498db; background: radial-gradient(circle, #1a2a3a, #1c1f26); }
        .uncommon { border-bottom-color: #2ecc71; background: radial-gradient(circle, #1a3a2a, #1c1f26); }
        .common { border-bottom-color: #95a5a6; background: radial-gradient(circle, #2c3e50, #1c1f26); }

        .btn-action {
            background: linear-gradient(90deg, #ff9a00, #ff512f);
            color: white;
            border: none;
            padding: 14px 40px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(255, 81, 47, 0.4);
        }

        .btn-back {
            background: #2c3242;
            color: #bdc3c7;
            border: none;
            padding: 8px 20px;
            margin-top: 20px;
            border-radius: 20px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <!-- ================= ГЛАВНЫЙ ЭКРАН ================= -->
    <div id="main-screen">
        <h1>🎰 МАГАЗИН КЕЙСОВ</h1>
        <p class="subtitle">Выбирай кейс и выбивай топовый дроп!</p>
        
        <div class="cases-grid">
            <div class="case-card" onclick="selectCase('fire')">
                <!-- ПРЯМАЯ РАБОЧАЯ ССЫЛКА НА ТВОЙ ОГНЕННЫЙ КЕЙС -->
                <img id="case-img-src" src="https://i.ibb.co/6R68gX0z/image-824319.png" alt="Fire Case">
                <div class="case-title">🔥 Fire Case</div>
                <div class="case-cost">100 Голды</div>
            </div>
        </div>
    </div>

    <!-- ================= ЭКРАН РУЛЕТКИ ================= -->
    <div id="roulette-screen">
        <h1 id="roulette-title">Открытие кейса</h1>
        
        <div class="roulette-wrapper">
            <div class="pointer"></div>
            <div class="tape" id="tape"></div>
        </div>

        <button class="btn-action" id="spin-btn" onclick="startRoulette()">КРУТИТЬ</button>
        <br>
        <button class="btn-back" id="back-btn" onclick="toMainScreen()">⬅ Назад к кейсам</button>
    </div>

    <!-- ================= ЛОГИКА И 15 СКИНОВ ================= -->
    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let currentCase = null;

        const casesData = {
            fire: {
                title: "🔥 Fire Case",
                cost: 100,
                items: [
                    { name: "M4 | Necromancer", price: 300, rarity: "arcana", weight: 2, img: "https://img.icons8.com/emoji/96/submachine-gun.png" },
                    { name: "AWM | Scratch", price: 220, rarity: "arcana", weight: 3, img: "https://img.icons8.com/emoji/96/sniper-rifle.png" },
                    { name: "AKR | Carbon", price: 180, rarity: "arcana", weight: 3, img: "https://img.icons8.com/emoji/96/rifle.png" },
                    { name: "P90 | Ghoul", price: 150, rarity: "arcana", weight: 4, img: "https://img.icons8.com/emoji/96/submachine-gun.png" },
                    
                    { name: "AKR | Tiger", price: 120, rarity: "legendary", weight: 7, img: "https://img.icons8.com/emoji/96/rifle.png" },
                    { name: "M4A1 | Bubblegum", price: 110, rarity: "legendary", weight: 7, img: "https://img.icons8.com/emoji/96/submachine-gun.png" },
                    { name: "Desert Eagle | Dragon", price: 90, rarity: "legendary", weight: 8, img: "https://img.icons8.com/emoji/48/pistol.png" },
                    { name: "Famas | Fury", price: 80, rarity: "legendary", weight: 8, img: "https://img.icons8.com/emoji/96/rifle.png" },
                    
                    { name: "G22 | Nest", price: 15, rarity: "rare", weight: 11, img: "https://img.icons8.com/emoji/96/pistol.png" },
                    { name: "P350 | Skull", price: 12, rarity: "rare", weight: 11, img: "https://img.icons8.com/emoji/96/pistol.png" },
                    { name: "AP | Sector", price: 10, rarity: "rare", weight: 11, img: "https://img.icons8.com/emoji/32/pistol.png" },
                    { name: "M16 | Iron Will", price: 9, rarity: "rare", weight: 11, img: "https://img.icons8.com/emoji/96/rifle.png" },
                    
                    { name: "UMP-45 | Cyberpunk", price: 5, rarity: "uncommon", weight: 5, img: "https://img.icons8.com/emoji/96/submachine-gun.png" },
                    { name: "FabM | Parrot", price: 4, rarity: "uncommon", weight: 5, img: "https://img.icons8.com/emoji/96/shotgun.png" },
                    
                    { name: "G22 | Scale", price: 2, rarity: "common", weight: 4, img: "https://img.icons8.com/emoji/96/pistol.png" }
                ]
            }
        };

        function selectCase(caseKey) {
            currentCase = casesData[caseKey];
            document.getElementById("main-screen").style.display = "none";
            document.getElementById("roulette-screen").style.display = "block";
            document.getElementById("roulette-title").innerText = currentCase.title;
            generateTape();
        }

        function toMainScreen() {
            document.getElementById("main-screen").style.display = "block";
            document.getElementById("roulette-screen").style.display = "none";
            resetTape();
        }

        function generateTape() {
            const tape = document.getElementById("tape");
            tape.innerHTML = "";
            for (let i = 0; i < 45; i++) {
                const randomItem = currentCase.items[Math.floor(Math.random() * currentCase.items.length)];
                const card = document.createElement("div");
                card.className = `item-card ${randomItem.rarity}`;
                card.innerHTML = `<img src="${randomItem.img}"><br><b>${randomItem.name}</b>`;
                tape.appendChild(card);
            }
        }

        function resetTape() {
            const tape = document.getElementById("tape");
            tape.style.transition = "none";
            tape.style.transform = "translateX(0px)";
            document.getElementById("spin-btn").disabled = false;
            document.getElementById("back-btn").style.display = "inline-block";
        }

        function startRoulette() {
            document.getElementById("spin-btn").disabled = true;
            document.getElementById("back-btn").style.display = "none";
            resetTape();
            
            let totalWeight = 0;
            currentCase.items.forEach(item => totalWeight += item.weight);
            
            let randomNum = Math.floor(Math.random() * totalWeight);
            let winningItem = currentCase.items[0];
            
            for (let i = 0; i < currentCase.items.length; i++) {
                randomNum -= currentCase.items[i].weight;
                if (randomNum < 0) {
                    winningItem = currentCase.items[i];
                    break;
                }
            }

            const tape = document.getElementById("tape");
            const cards = tape.getElementsByClassName("item-card");
            cards[37].className = `item-card ${winningItem.rarity}`;
            cards[37].innerHTML = `<img src="${winningItem.img}"><br><b>${winningItem.name}</b>`;

            const cardWidth = 110; 
            const centerOffset = window.innerWidth / 2 - 55;
            const randomInCard = Math.floor(Math.random() * 80) + 10;
            const finalScroll = (37 * cardWidth) - centerOffset + randomInCard;

            setTimeout(() => {
                tape.style.transition = "transform 5s cubic-bezier(0.1, 0.8, 0.1, 1)";
                tape.style.transform = `translateX(-${finalScroll}px)`;
            }, 50);

            setTimeout(() => {
                const webAppData = {
                    case_cost: currentCase.cost,
                    item_name: winningItem.name,
                    item_price: winningItem.price
                };
                tg.sendData(JSON.stringify(webAppData));
            }, 5300);
        }
    </script>
</body>
</html>
